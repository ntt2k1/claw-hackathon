<script>
        function selectCard(element) {
            // Remove selection from all other cards
            document.querySelectorAll('.animate-card').forEach(card => {
                card.querySelector('div:last-child').classList.remove('bg-primary-container', 'text-on-primary-container', 'scale-[1.02]');
                card.querySelector('div:last-child').classList.add('bg-surface-container-low', 'text-on-surface');
                card.querySelector('div:first-child').classList.remove('ring-4', 'ring-primary');
            });

            // Add selection to clicked card
            const content = element.querySelector('div:last-child');
            const imgContainer = element.querySelector('div:first-child');
            
            content.classList.remove('bg-surface-container-low', 'text-on-surface');
            content.classList.add('bg-primary-container', 'text-on-primary-container', 'scale-[1.02]');
            imgContainer.classList.add('ring-4', 'ring-primary');

            // Show the action bar
            const actionBar = document.getElementById('action-bar');
            actionBar.classList.remove('opacity-0', 'translate-y-full');
            actionBar.classList.add('opacity-100', 'translate-y-0');
        }

        // Ambient Background Interaction
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            document.body.style.backgroundImage = `radial-gradient(circle at ${x * 100}% ${y * 100}%, rgba(255, 107, 107, 0.05) 0%, transparent 50%)`;
        });
    </script>
